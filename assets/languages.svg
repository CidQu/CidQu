<svg width="400" height="255" xmlns="http://www.w3.org/2000/svg">

    <style>
        :root {
            --bg: #ffffff;
            --card-bg: #ffffff;
            --border: #e4e2e2;
            --text-title: #24292f;
            --text-body: #57606a;
            --text-value: #24292f;
            --bar-bg: #ebecf0;
            --accent: #0969da;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0d1117;
                --card-bg: #0d1117;
                --border: #30363d;
                --text-title: #c9d1d9;
                --text-body: #8b949e;
                --text-value: #c9d1d9;
                --bar-bg: #21262d;
                --accent: #58a6ff;
            }
        }
        * { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
        .card { fill: var(--card-bg); stroke: var(--border); stroke-width: 1px; }
        .title { fill: var(--text-title); font-size: 16px; font-weight: 600; }
        .stat-label { fill: var(--text-body); font-size: 12px; font-weight: 500; }
        .stat-value { fill: var(--text-value); font-size: 20px; font-weight: 700; }
        .lang-name { fill: var(--text-body); font-size: 12px; font-weight: 600; }
        .lang-pct { fill: var(--text-value); font-size: 12px; font-weight: 600; text-anchor: end; }
        .anim-target { opacity: 0; animation: slideIn 0.8s ease-out forwards; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    
<rect class="card" x="0.5" y="0.5" width="399" height="254" rx="12"/>
<text class="title anim-target delay-1" x="25" y="35">💻 Most Used Languages</text>
<g class="anim-target delay-2">
<text class="lang-name" x="25" y="75">Dart</text>
<text class="lang-pct" x="375" y="75">58.0%</text>
<line x1="25" y1="87" x2="375" y2="87" stroke="var(--bar-bg)" stroke-width="8" stroke-linecap="round"/>
<line x1="25" y1="87" x2="187.46401856195305" y2="87" stroke="#00B4AB" stroke-width="8" stroke-linecap="round">
<animate attributeName="x2" values="25;187.46401856195305" dur="0.8s" begin="0.3s" calcMode="spline" keySplines="0.2 0.8 0.2 1" fill="freeze" />
</line>
</g>
<g class="anim-target delay-3">
<text class="lang-name" x="25" y="105">Swift</text>
<text class="lang-pct" x="375" y="105">17.1%</text>
<line x1="25" y1="117" x2="375" y2="117" stroke="var(--bar-bg)" stroke-width="8" stroke-linecap="round"/>
<line x1="25" y1="117" x2="72.84091868216859" y2="117" stroke="#F05138" stroke-width="8" stroke-linecap="round">
<animate attributeName="x2" values="25;72.84091868216859" dur="0.8s" begin="0.3s" calcMode="spline" keySplines="0.2 0.8 0.2 1" fill="freeze" />
</line>
</g>
<g class="anim-target delay-4">
<text class="lang-name" x="25" y="135">Blade</text>
<text class="lang-pct" x="375" y="135">10.4%</text>
<line x1="25" y1="147" x2="375" y2="147" stroke="var(--bar-bg)" stroke-width="8" stroke-linecap="round"/>
<line x1="25" y1="147" x2="54.10198145486032" y2="147" stroke="#f7523f" stroke-width="8" stroke-linecap="round">
<animate attributeName="x2" values="25;54.10198145486032" dur="0.8s" begin="0.3s" calcMode="spline" keySplines="0.2 0.8 0.2 1" fill="freeze" />
</line>
</g>
<g class="anim-target delay-5">
<text class="lang-name" x="25" y="165">PHP</text>
<text class="lang-pct" x="375" y="165">7.1%</text>
<line x1="25" y1="177" x2="375" y2="177" stroke="var(--bar-bg)" stroke-width="8" stroke-linecap="round"/>
<line x1="25" y1="177" x2="44.89486267685557" y2="177" stroke="#4F5D95" stroke-width="8" stroke-linecap="round">
<animate attributeName="x2" values="25;44.89486267685557" dur="0.8s" begin="0.3s" calcMode="spline" keySplines="0.2 0.8 0.2 1" fill="freeze" />
</line>
</g>
<g class="anim-target delay-6">
<text class="lang-name" x="25" y="195">TypeScript</text>
<text class="lang-pct" x="375" y="195">3.0%</text>
<line x1="25" y1="207" x2="375" y2="207" stroke="var(--bar-bg)" stroke-width="8" stroke-linecap="round"/>
<line x1="25" y1="207" x2="33.48162887863273" y2="207" stroke="#3178c6" stroke-width="8" stroke-linecap="round">
<animate attributeName="x2" values="25;33.48162887863273" dur="0.8s" begin="0.3s" calcMode="spline" keySplines="0.2 0.8 0.2 1" fill="freeze" />
</line>
</g>
<g class="anim-target delay-7">
<text class="lang-name" x="25" y="225">Python</text>
<text class="lang-pct" x="375" y="225">1.5%</text>
<line x1="25" y1="237" x2="375" y2="237" stroke="var(--bar-bg)" stroke-width="8" stroke-linecap="round"/>
<line x1="25" y1="237" x2="29.320805696367472" y2="237" stroke="#3572A5" stroke-width="8" stroke-linecap="round">
<animate attributeName="x2" values="25;29.320805696367472" dur="0.8s" begin="0.3s" calcMode="spline" keySplines="0.2 0.8 0.2 1" fill="freeze" />
</line>
</g>
</svg>